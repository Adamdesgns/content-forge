name: Build Windows Desktop App

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer + portable exe
        run: npx electron-builder --win nsis portable --publish never
      - name: Publish installer to the Desktop release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete desktop-latest --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create desktop-latest --repo "$GITHUB_REPOSITORY" \
            --title "Content Forge — Desktop" \
            --notes "Windows desktop app. Download the Setup .exe, run it, and click More info -> Run anyway if SmartScreen warns (the app is unsigned). Includes the AI Studio for OpenAI text + image generation."
          gh release upload desktop-latest release/*.exe --clobber --repo "$GITHUB_REPOSITORY"
      - name: Publish versioned release (clean history per version)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
                 --title "Content Forge $TAG" \
                 --notes "Content Forge $TAG desktop build. Download the Setup .exe and run it (click More info -> Run anyway if SmartScreen warns)."
          gh release upload "$TAG" release/*.exe --clobber --repo "$GITHUB_REPOSITORY"
